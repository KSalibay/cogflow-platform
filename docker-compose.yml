version: "3.9"

services:
  api:
    build:
      context: ./backend
    container_name: cogflow-platform-api
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio

  db:
    image: postgres:16
    container_name: cogflow-platform-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cogflow_platform}
      POSTGRES_USER: ${POSTGRES_USER:-cogflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cogflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: cogflow-platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
