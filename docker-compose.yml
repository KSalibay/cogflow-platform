services:
  api:
    build:
      context: ./backend
    container_name: cogflow-platform-api
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate && gunicorn project.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --threads ${GUNICORN_THREADS:-2} --timeout ${GUNICORN_TIMEOUT:-120}"
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: cogflow-platform-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cogflow_platform}
      POSTGRES_USER: ${POSTGRES_USER:-cogflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cogflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cogflow} -d ${POSTGRES_DB:-cogflow_platform}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: cogflow-platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cogflow-platform-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  adminer:
    image: adminer:4
    container_name: cogflow-platform-adminer
    ports:
      - "8080:8080"
    environment:
      # Pre-fill the login form with platform DB credentials so the admin
      # only needs to enter the password.
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DEFAULT_DB: ${POSTGRES_DB:-cogflow_platform}
      ADMINER_DEFAULT_USERNAME: ${POSTGRES_USER:-cogflow}
      ADMINER_DEFAULT_DRIVER: pgsql
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
