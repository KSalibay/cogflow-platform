<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CogFlow Builder (JATOS)</title>
  <link rel="icon" href="data:," />

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <script>
    (function () {
      try {
        const savedTheme = localStorage.getItem('cogflow_builder_theme');
        const theme = (savedTheme === 'dark' || savedTheme === 'light') ? savedTheme : 'light';
        document.documentElement.setAttribute('data-cf-theme', theme);
      } catch {
        document.documentElement.setAttribute('data-cf-theme', 'light');
      }
    })();
  </script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #e3e9e5;
      color: #232742;
    }
    html[data-cf-theme="dark"] body {
      background: #262c41;
      color: rgba(223,232,225,0.92);
    }
    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      box-sizing: border-box;
    }
    .card {
      width: min(820px, 100%);
      border: 1px solid rgba(48,51,74,0.16);
      border-radius: 12px;
      padding: 16px;
      background: #ffffff;
    }
    html[data-cf-theme="dark"] .card {
      border: 1px solid rgba(186,199,190,0.28);
      background: #2f3550;
    }
    .top-theme-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1000;
      border: 1px solid rgba(48,51,74,0.35);
      border-radius: 999px;
      padding: 6px 10px;
      background: #ffffff;
      color: #232742;
      font-size: 12px;
      cursor: pointer;
    }
    html[data-cf-theme="dark"] .top-theme-toggle {
      border-color: rgba(186,199,190,0.45);
      background: #3a405a;
      color: rgba(223,232,225,0.95);
    }
    .muted { opacity: 0.75; }
    code { opacity: 0.95; }
  </style>
</head>
<body>
  <button id="pageThemeToggleJatos" class="top-theme-toggle" type="button">Theme: Light</button>
  <div class="wrap">
    <div class="card">
      <div style="font-weight:600; font-size: 16px;">Loading CogFlow Builder…</div>
      <div class="muted" style="margin-top:10px; line-height:1.35;">
        Loading Builder under JATOS <code>/publix/…/start</code>.
      </div>
      <div id="details" class="muted" style="margin-top:10px; white-space:pre-wrap;"></div>
    </div>
  </div>

  <script>
    (function () {
      const setBuilderTheme = (theme) => {
        const t = (theme === 'dark') ? 'dark' : 'light';
        document.documentElement.setAttribute('data-cf-theme', t);
        try { localStorage.setItem('cogflow_builder_theme', t); } catch { /* ignore */ }
        const btn = document.getElementById('pageThemeToggleJatos');
        if (btn) btn.textContent = `Theme: ${t === 'dark' ? 'Dark' : 'Light'}`;
      };

      const initialTheme = document.documentElement.getAttribute('data-cf-theme') || 'light';
      setBuilderTheme(initialTheme);

      const pageThemeToggle = document.getElementById('pageThemeToggleJatos');
      if (pageThemeToggle) {
        pageThemeToggle.addEventListener('click', () => {
          const current = document.documentElement.getAttribute('data-cf-theme') || 'light';
          setBuilderTheme(current === 'dark' ? 'light' : 'dark');
        });
      }

      const detailsEl = document.getElementById('details');
      const log = (...args) => {
        try { console.log('[Builder]', ...args); } catch { /* ignore */ }
        try {
          if (!detailsEl) return;
          detailsEl.textContent += args.map((a) => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ') + "\n";
        } catch {
          // ignore
        }
      };

      async function ensureJatosApiLoaded() {
        try {
          // jatos.js often defines `const jatos = {}` (lexical global), not `window.jatos`.
          // eslint-disable-next-line no-undef
          if (typeof jatos !== 'undefined' && jatos) return true;
        } catch {
          // ignore
        }

        try {
          if (typeof window.jatos !== 'undefined' && window.jatos) return true;
        } catch {
          // ignore
        }

        const tryLoad = (src) => {
          return new Promise((resolve) => {
            try {
              const s = document.createElement('script');
              s.src = src;
              s.async = true;
              s.onload = () => resolve(true);
              s.onerror = () => resolve(false);
              document.head.appendChild(s);
            } catch {
              resolve(false);
            }
          });
        };

        // Try common JATOS API locations across deployments.
        const candidates = [
          '/assets/javascripts/jatos.js',
          '/jatos.js',
          '/jatos/assets/javascripts/jatos.js',
          '/jatos/jatos.js'
        ];

        for (const src of candidates) {
          const ok = await tryLoad(src);
          log('JATOS API load', ok ? 'OK' : 'FAIL', src);
          try {
            // eslint-disable-next-line no-undef
            if (ok && typeof jatos !== 'undefined' && jatos) return true;
          } catch {
            // ignore
          }

          try {
            if (ok && typeof window.jatos !== 'undefined' && window.jatos) return true;
          } catch {
            // ignore
          }
        }

        return false;
      }

      const pathname = (window.location && typeof window.location.pathname === 'string') ? window.location.pathname : '';

      const parts = pathname.split('/').filter(Boolean);
      const publixIdx = parts.indexOf('publix');
      const studyId = (publixIdx >= 0 && parts.length > publixIdx + 1) ? parts[publixIdx + 1] : '';
      const componentId = (publixIdx >= 0 && parts.length > publixIdx + 2) ? parts[publixIdx + 2] : '';

      // IMPORTANT: We avoid redirecting to /publix/.../builder/index.html because that route
      // is commonly protected by a strict CSP (nonce + strict-dynamic) that blocks Builder's
      // inline scripts. JATOS' /start route is marked +nocsp in publix.routes, so we keep the
      // top-level document at /start and load builder/index.html into it.

      // Wrapper build id used to bust caches for Builder's local scripts.
      // If you update Builder JS and still see old behavior under JATOS, bump this string.
      const BUILDER_WRAPPER_BUILD = '20260305-1';

      const builderBase = (studyId && componentId) ? `/publix/${studyId}/${componentId}/builder/` : '';
      const builderIndexUrl = builderBase ? new URL(builderBase + 'index.html', window.location.origin).toString() : '';

      function isProbablyExecutableScriptType(typeAttr) {
        const t = (typeAttr || '').trim().toLowerCase();
        return !t || t === 'text/javascript' || t === 'application/javascript' || t === 'module';
      }

      function setDocumentFromParsedHtml(parsedDoc) {
        // Replace head and body contents without executing any scripts.
        try {
          document.documentElement.lang = parsedDoc.documentElement.lang || document.documentElement.lang || 'en';
        } catch {
          // ignore
        }

        try {
          if (parsedDoc.title) document.title = parsedDoc.title;
        } catch {
          // ignore
        }

        const clear = (el) => {
          while (el && el.firstChild) el.removeChild(el.firstChild);
        };

        clear(document.head);
        clear(document.body);

        const appendNonScripts = (fromEl, toEl) => {
          const nodes = Array.from(fromEl.childNodes || []);
          for (const node of nodes) {
            if (node && node.nodeType === Node.ELEMENT_NODE) {
              const tag = String(node.tagName || '').toUpperCase();
              if (tag === 'SCRIPT') continue;
            }
            toEl.appendChild(document.importNode(node, true));
          }
        };

        appendNonScripts(parsedDoc.head, document.head);
        appendNonScripts(parsedDoc.body, document.body);
      }

      function collectScriptsInDocumentOrder(parsedDoc) {
        const scripts = [];
        const it = parsedDoc.createNodeIterator(
          parsedDoc.documentElement,
          NodeFilter.SHOW_ELEMENT,
          {
            acceptNode(node) {
              try {
                return node && node.tagName && String(node.tagName).toUpperCase() === 'SCRIPT'
                  ? NodeFilter.FILTER_ACCEPT
                  : NodeFilter.FILTER_SKIP;
              } catch {
                return NodeFilter.FILTER_SKIP;
              }
            }
          }
        );

        let node;
        while ((node = it.nextNode())) {
          const el = /** @type {HTMLScriptElement} */ (node);
          const attrs = {};
          for (const a of Array.from(el.attributes || [])) {
            attrs[a.name] = a.value;
          }
          scripts.push({
            attrs,
            src: el.getAttribute('src') || '',
            text: el.textContent || ''
          });
        }
        return scripts;
      }

      function cacheBustBuilderLocalScript(urlString, builderBaseHref) {
        try {
          const u = new URL(urlString, window.location.origin);
          if (u.origin !== window.location.origin) return u.toString();

          if (builderBaseHref) {
            const basePath = new URL(builderBaseHref, window.location.origin).pathname;
            if (basePath && !u.pathname.startsWith(basePath)) return u.toString();
          }

          u.searchParams.set('cfv', BUILDER_WRAPPER_BUILD);
          return u.toString();
        } catch {
          return urlString;
        }
      }

      async function loadScriptsSequentially(scripts, baseHref) {
        const baseUrl = new URL(baseHref, window.location.origin);

        for (const s of scripts) {
          const typeAttr = (s.attrs && typeof s.attrs.type === 'string') ? s.attrs.type : '';
          const executable = isProbablyExecutableScriptType(typeAttr);

          // For non-executable script tags (e.g., application/json), we just re-insert them.
          if (!executable) {
            const el = document.createElement('script');
            for (const [k, v] of Object.entries(s.attrs || {})) {
              try { el.setAttribute(k, v); } catch { /* ignore */ }
            }
            if (s.src) {
              try {
                const resolved = new URL(s.src, baseUrl).toString();
                el.src = cacheBustBuilderLocalScript(resolved, baseHref);
              } catch {
                el.src = cacheBustBuilderLocalScript(s.src, baseHref);
              }
            } else {
              el.textContent = s.text || '';
            }
            document.head.appendChild(el);
            continue;
          }

          if (s.src) {
            const el = document.createElement('script');
            // Preserve relevant attributes (but do not copy any nonce from the fetched HTML).
            for (const [k, v] of Object.entries(s.attrs || {})) {
              if (k.toLowerCase() === 'nonce') continue;
              try { el.setAttribute(k, v); } catch { /* ignore */ }
            }
            try {
              const resolved = new URL(s.src, baseUrl).toString();
              el.src = cacheBustBuilderLocalScript(resolved, baseHref);
            } catch {
              el.src = cacheBustBuilderLocalScript(s.src, baseHref);
            }
            // Force sequential execution order.
            el.async = false;

            await new Promise((resolve, reject) => {
              el.onload = () => resolve();
              el.onerror = () => reject(new Error(`Failed to load script: ${el.src}`));
              document.head.appendChild(el);
            });
          } else {
            const el = document.createElement('script');
            for (const [k, v] of Object.entries(s.attrs || {})) {
              if (k.toLowerCase() === 'nonce') continue;
              try { el.setAttribute(k, v); } catch { /* ignore */ }
            }
            el.textContent = s.text || '';
            document.head.appendChild(el);
          }
        }
      }

      function dispatchReadyEvents() {
        // In this wrapper, we inject Builder's scripts after the initial document already loaded.
        // Many apps rely on DOMContentLoaded; re-dispatching ensures late listeners still run.
        try {
          document.dispatchEvent(new Event('DOMContentLoaded', { bubbles: true, cancelable: true }));
        } catch {
          // ignore
        }
        try {
          window.dispatchEvent(new Event('load'));
        } catch {
          // ignore
        }
      }

      function forceBuilderInitIfNeeded() {
        // Run in global script scope to access top-level bindings like JsonBuilder.
        const el = document.createElement('script');
        el.textContent = `
(function(){
  try {
    if (window.jsonBuilderInstance && typeof window.jsonBuilderInstance.initialize === 'function') return;
    if (typeof JsonBuilder === 'undefined') return;
    var jb = new JsonBuilder();
    if (typeof jb.initialize === 'function') jb.initialize();
    window.jsonBuilderInstance = jb;
  } catch (e) {
    try { console.error('[Builder][wrapper] init error', e); } catch (_) {}
  }
})();
        `.trim();
        document.head.appendChild(el);
      }

      (async () => {
        log('location.pathname:', pathname);
        log('builderBase:', builderBase);

        // Best-effort: load the JATOS API early so Builder can back up exports
        // to JATOS result files via jatos.uploadResultFile.
        await ensureJatosApiLoaded();

        if (!builderIndexUrl) {
          log('ERROR: This page must be opened via JATOS /publix/<studyResultUuid>/<componentUuid>/start');
          return;
        }

        const res = await fetch(builderIndexUrl, { method: 'GET', cache: 'no-store', credentials: 'same-origin' });
        log('fetch', res.status, builderIndexUrl);
        if (!res || !res.ok) {
          log('ERROR: failed to fetch builder/index.html');
          return;
        }

        const htmlText = await res.text();
        const parsed = new DOMParser().parseFromString(htmlText, 'text/html');

        // Inject/replace base href so all relative URLs resolve under /builder/.
        const desiredBaseHref = builderBase;
        try {
          const existingBase = parsed.head.querySelector('base');
          if (existingBase) {
            existingBase.setAttribute('href', desiredBaseHref);
          } else {
            const baseEl = parsed.createElement('base');
            baseEl.setAttribute('href', desiredBaseHref);
            parsed.head.insertBefore(baseEl, parsed.head.firstChild);
          }
        } catch {
          // ignore
        }

        const scripts = collectScriptsInDocumentOrder(parsed);
        log('scripts found:', scripts.length);

        // Render HTML without scripts, then load scripts sequentially.
        // This keeps the top-level URL at /start (typically CSP-exempt in JATOS) and avoids
        // document.write parser-blocking warnings.
        setDocumentFromParsedHtml(parsed);
        await loadScriptsSequentially(scripts, desiredBaseHref);

        // Make sure init handlers fire even though the wrapper already loaded.
        dispatchReadyEvents();
        forceBuilderInitIfNeeded();
      })().catch((e) => {
        log('ERROR:', e && e.message ? e.message : String(e));
      });
    })();
  </script>
</body>
</html>
